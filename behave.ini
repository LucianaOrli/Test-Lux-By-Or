# Configuração do Behave para testes do Assistente IA Bancário

[behave]
# Diretório onde estão os arquivos .feature
features = features

# Diretório onde estão os steps
steps = features/steps

# Formato de saída padrão
format = pretty

# Cores na saída
color = yes

# Mostrar traceback completo em caso de erro
show_traceback = yes

# Mostrar código fonte nos erros
show_source = yes

# Parar no primeiro erro (comente para executar todos os testes)
# stop = on-failure

# Nível de verbosidade (0-3)
verbosity = 2

# Idioma padrão para Gherkin
language = pt

# Tags para incluir/excluir testes
# tags = @smoke
# tags = ~@wip
